          <!-- CONTACT SECTION -->
<section id="contact" class="parallax-section">
    <div class="container">
         <div class="row">

              <div class="col-md-12 col-sm-12">
                   <!-- SECTION TITLE -->
                   <div class="wow fadeInUp section-title" data-wow-delay="0.2s">
                        <h2>Contact</h2>
                        <p>Will try and get back to you in 24 hours.</p>
                   </div>
              </div>

              <div class="col-md-7 col-sm-10">
                   <!-- CONTACT FORM HERE -->
                <div class="col-md-8">
                    <div class="well well-sm">
                        <form action="mailto:some@email.com" method="post">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="name">
                                        Name</label>
                                    <input type="text" class="form-control" id="name" placeholder="Enter name" required="required" />
                                </div>
                                <div class="form-group">
                                    <label for="email">
                                        Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-addon"><span class="glyphicon glyphicon-envelope"></span>
                                        </span>
                                        <input type="email" class="form-control" id="email" placeholder="Enter email" required="required" /></div>
                                </div>
                                <div class="form-group">
                                    <label for="subject">
                                        Subject</label>
                                    <select id="subject" name="subject" class="form-control" required="required">
                                        <option value="na" selected="">Choose One:</option>
                                        <option value="service">Commision </option>
                                        <option value="suggestions">Question</option>
                                        <option value="product">Help</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="name">
                                        Message</label>
                                    <textarea name="message" id="message" class="form-control" rows="9" cols="25" required="required"
                                        placeholder="Message"></textarea>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary pull-right" id="btnContactUs">
                                    Send Message</button>
                            </div>
                        </div>
                        </form>
                    </div>
                    

              <div class="col-md-5 col-sm-8">
                   <!-- CONTACT INFO -->
                   <div class="wow fadeInUp contact-info" data-wow-delay="0.4s">
                        <div class="section-title">
                             <h2>Contact Info</h2>
                             <p>Email would be prefered and will contact you back as soon as possible</p>
                        </div>
                        
                        <p><i class="fa fa-map-marker"></i> 456 New Street 22000, New York City, USA</p>
                        <p><i class="fa fa-comment"></i> <a href="mailto:info@company.com">info@company.com</a></p>
                        <p><i class="fa fa-phone"></i> 010-020-0340</p>
                   </div>
              </div>

         </div>
    </div>
</section>
